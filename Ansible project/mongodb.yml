- name: configure mongodb
  hosts: mongodb
  become: yes

  tasks:
  - name: copy mongodb repo
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongodb.repo
  
  - name: install mongodb
    ansible.builtin.dnf:
      name: mongodb
      state: present

  - name: replace the configure IP
    ansible.builtin.replace:
       path: /etc/mongod.conf
       regexp: '127.0.0.1'
       replace: '0.0.0.0'

  - name: start and enable service
    ansible.builtin.service:
      name: mongod
      state: started
      enabled: yes

  - name: Check if movie database exists
    ansible.builtin.shell: |
       mongosh --quiet --eval "db.getMongo().getDBNames().indexOf('daws88sonline')"
    register: mongodb_check
    changed_when: false
    ignore_errors: yes

  - name: Copy movie data
    ansible.builtin.copy:
        src: movies.json
        dest: /tmp/movies.json
    when: mongodb_check.stdout == "-1"

  - name: Import movie data
    ansible.builtin.shell: |
        mongoimport --db moviehub --collection movies --file /tmp/movies.json --jsonArray
    when: mongodb_check.stdout == "-1"