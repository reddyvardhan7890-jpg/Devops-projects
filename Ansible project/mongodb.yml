- name: configure mongodb
  hosts: mongodb
  become: yes

  tasks:
  - name: copy mongodb repo
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongodb.repo
  
  - name: install mongodb
    ansible.builtin.dnf:
      name: mongodb-org
      state: present

  - name: replace the configure IP
    ansible.builtin.replace:
       path: /etc/mongod.conf
       regexp: '127.0.0.1'
       replace: '0.0.0.0'

  - name: start and enable service
    ansible.builtin.service:
      name: mongodb
      state: started
      enabled: yes

  - name: copy the movie service
    ansible.builtin.copy:
      src: movies.json
      dest: /tmp/movies.json