- name: configure catalogue 
  hosts: catalogue
  become: yes
  tasks: 
  - name: install nodejs 20
    ansible.builtin.dnf:
      name: nodejs:20
      state: present

  - name: create a user
    ansible.builtin.user: 
      name: movie
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "Created a movie user"

  - name: delete old directory
    ansible.builtin.file:
      path: /app
      state: absent

  - name: create a directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: delete catalogue zip file
    ansible.builtin.file:
        path: /tmp/catalogue.zip
        state: absent

  - name: Download zip file
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip  
      dest: /tmp/catalogue.zip

  - name: unarchive the zip
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes

  - name: install dependencies
    community.general.npm:
      path: /app

  - name: Copy file with owner and permissions
    ansible.builtin.copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service

  - name: daemon reload
    ansible.builtin.systemd:
      daemon_reload: yes
    
  - name: copy mongo repo
    ansible.builtin.copy:
        src: mongo.repo
        dest: /etc/yum.repos.d/mongo.repo

  - name: install mongodb client
    ansible.builtin.dnf:
        name: mongodb-mongosh
        state: present

  - name: check products loaded
    ansible.builtin.command: mongosh --host "{{ MONGODB_HOST }}" --quiet  --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
    register: catalogue_output
    changed_when: false
    failed_when: false

  - name: print the output
    ansible.builtin.debug:
        msg: "{{ catalogue_output }}"

  - name: load the products
    ansible.builtin.shell: mongosh --host "{{ MONGODB_HOST }}" </app/db/master-data.js
    when: catalogue_output.stdout  | int < 0

  - name: start catalogue
    ansible.builtin.service:
        name: catalogue
        state: started
        enabled: yes